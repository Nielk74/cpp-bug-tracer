name: cpp-bug-tracer
description: Investigates bugs in C++ codebases using coordinated specialist agents
version: 2
max_depth: 2

agents:
  - name: orchestrator
    file: orchestrator.md
    mode: primary
    model: openrouter/qwen/qwen3-coder-30b-a3b-instruct
    calls: [abstractor]

  - name: abstractor
    file: abstractor.md
    mode: subagent
    model: openrouter/qwen/qwen3-coder-30b-a3b-instruct
    calls: [investigator]

  - name: investigator
    file: investigator.md
    mode: subagent
    model: openrouter/qwen/qwen3-coder-30b-a3b-instruct
    calls: []

mock_responses:
  investigator:
    # --- Event/notification sender thread (eval 6: notification type, eval 7: settlement event) ---
    - trigger: ".*sender.*event.*|.*what.*send.*|.*DispatchSettlement.*|.*NotifyTradeValidated.*"
      response: |
        ## Question answered
        What event type / value does the sender pass when dispatching this event?

        ## Answer
        CSettlementService::DispatchSettlementEvent passes m_nEventType = 3 for a COMPLETED settlement
        (line 259). CNotificationService::NotifyTradeValidated sends NOTIFICATION_TYPE_TRADE_SUBMITTED
        (not NOTIFICATION_TYPE_TRADE_VALIDATED) when bIsValid == true (line ~45).

        ## Evidence
        | File | Line | What it shows |
        |------|------|---------------|
        | src/services/CSettlementService.cpp | 259 | DispatchSettlementEvent(record, 3) for COMPLETED |
        | src/services/CNotificationService.cpp | ~45 | SendNotification(NOTIFICATION_TYPE_TRADE_SUBMITTED, ...) in the bIsValid==true branch |

        ## Chain traced
        ProcessSettlement → UpdateSettlementStatus(COMPLETED) → DispatchSettlementEvent(record, 3)
        ValidateTrade(bIsValid=true) → NotifyTradeValidated → SendNotification(NOTIFICATION_TYPE_TRADE_SUBMITTED)

        ## Key value tracked
        Settlement COMPLETED sends event type 3. Notification for valid trade sends NOTIFICATION_TYPE_TRADE_SUBMITTED.

        ## Suspicious items
        Event type 3 is the same integer used for trade submission events. NOTIFICATION_TYPE_TRADE_SUBMITTED is used where NOTIFICATION_TYPE_TRADE_VALIDATED was expected.

        ## Suggested next lookups
        CTradeEventDispatcher::DispatchEvent to see what case 3 maps to.
        CNotificationService::DispatchToHandlers to see how type is used as lookup key.

    # --- Event/notification receiver thread (eval 6, eval 7) ---
    - trigger: ".*receiver.*|.*DispatchEvent.*|.*DispatchToHandlers.*|.*case 3.*|.*handler.*"
      response: |
        ## Question answered
        What does the receiver do when it gets event type 3 / NOTIFICATION_TYPE_TRADE_SUBMITTED?

        ## Answer
        CTradeEventDispatcher::DispatchEvent dispatches event type 3 to OnTradeSubmitted on all listeners
        (case 3, line ~145). CNotificationService::DispatchToHandlers uses the notification type as a map
        lookup key — only handlers registered for that exact type receive the call.

        ## Evidence
        | File | Line | What it shows |
        |------|------|---------------|
        | src/legacy/CTradeEventDispatcher.cpp | ~145 | case 3: pListener->OnTradeSubmitted(...) |
        | src/services/CNotificationService.cpp | ~80 | m_mapHandlers[nType] lookup — type must match exactly |

        ## Chain traced
        DispatchEvent(event) → switch(event.m_nEventType) → case 3: OnTradeSubmitted
        DispatchToHandlers(NOTIFICATION_TYPE_TRADE_SUBMITTED) → finds handlers for SUBMITTED, not VALIDATED

        ## Key value tracked
        Type 3 → OnTradeSubmitted. Handlers for NOTIFICATION_TYPE_TRADE_VALIDATED never matched when
        NOTIFICATION_TYPE_TRADE_SUBMITTED is sent instead.

        ## Suspicious items
        Settlement events (types 4=FAILED, 5=CANCELLED) fall into default case — silently dropped.

        ## Suggested next lookups
        Nothing further needed — root cause is confirmed.

    # --- Counter/metric all-increments thread (eval 8: double workflow counter) ---
    - trigger: ".*counter.*|.*increment.*|.*TotalWorkflows.*|.*double.*count.*|.*metric.*"
      response: |
        ## Question answered
        Find every place m_nTotalWorkflowsStarted is incremented in the codebase.

        ## Answer
        m_nTotalWorkflowsStarted++ appears in TWO functions: FullTradeWorkflow (line 453) and
        CreateAndValidateTrade (line 119). Since FullTradeWorkflow calls CreateAndValidateTrade,
        every full workflow run increments the counter twice.

        ## Evidence
        | File | Line | What it shows |
        |------|------|---------------|
        | src/services/CTradeServiceFacade.cpp | 453 | m_nTotalWorkflowsStarted++ in FullTradeWorkflow |
        | src/services/CTradeServiceFacade.cpp | 119 | m_nTotalWorkflowsStarted++ in CreateAndValidateTrade |

        ## Chain traced
        FullTradeWorkflow:453 → m_nTotalWorkflowsStarted++ → calls CreateAndValidateTrade:119 → m_nTotalWorkflowsStarted++ again

        ## Key value tracked
        Counter incremented at two levels of the same call chain — caller and callee both increment.

        ## Suspicious items
        FullTradeWorkflow also increments m_nTotalWorkflowsFailed and m_nTotalWorkflowsCompleted directly, which CreateAndValidateTrade ALSO increments. Potentially triple-counting failures too.

        ## Suggested next lookups
        Check whether m_nTotalWorkflowsFailed and m_nTotalWorkflowsCompleted have the same double-increment issue.

    # --- ID generation and storage thread (eval 5: off-by-one reservation ID) ---
    - trigger: ".*GenerateReservation.*|.*ReserveCredit.*|.*reservation.*generat.*|.*map.*key.*reserv.*"
      response: |
        ## Question answered
        How is the reservation ID generated and stored in the map?

        ## Answer
        CCreditCheckService::ReserveCredit calls GenerateReservationId() which returns
        m_nNextReservationId++ (post-increment: returns N, then N becomes N+1). The returned value N
        is embedded in the reservation string. But the map is then keyed with m_nNextReservationId
        (now already N+1). So the map key is always off by one from the ID embedded in the string.

        ## Evidence
        | File | Line | What it shows |
        |------|------|---------------|
        | src/services/CCreditCheckService.cpp | ~60 | long nId = GenerateReservationId() — returns N (pre-increment) |
        | src/services/CCreditCheckService.cpp | ~62 | ss << "RES_" << nId — string embeds N |
        | src/services/CCreditCheckService.cpp | ~65 | m_mapReservationIdToTradeId[m_nNextReservationId] — key is N+1 |
        | src/services/CCreditCheckService.cpp | ~90 | GenerateReservationId(): return m_nNextReservationId++ |

        ## Chain traced
        ReserveCredit → GenerateReservationId() returns N, m_nNextReservationId becomes N+1 →
        string "RES_..._N" returned to caller → map stored at key N+1 →
        ReleaseCreditReservation(N) → map.find(N) → not found (key is N+1)

        ## Key value tracked
        Post-increment: GenerateReservationId returns N, but m_nNextReservationId is already N+1 when
        the map insertion happens. Off-by-one between the returned ID and the stored key.

        ## Suspicious items
        m_nNextReservationId is used as the map key AFTER the post-increment — it now holds a value
        one higher than what was returned to the caller.

        ## Suggested next lookups
        CCreditCheckService::ReleaseCreditReservation(long) to confirm the lookup fails with key N.

    # --- Double-settlement: facade state vs lifecycle state (eval 9) ---
    - trigger: ".*SettleAndNotify.*|.*double.*settle.*|.*settle.*twice.*|.*lifecycle.*settle.*state.*"
      response: |
        ## Question answered
        Does CTradeServiceFacade::SettleAndNotify update the lifecycle service state to Settled?

        ## Answer
        No. SettleAndNotify calls ScheduleSettlement and ProcessSettlement, then sets
        context.m_eCurrentState = TradeLifecycleState::Settled on its LOCAL SFullTradeContext
        object (line 427) and calls StoreTradeContext(context). It never calls
        m_pLifecycleService to record a state transition. CTradeLifecycleService still stores
        the trade as Executed.

        ## Evidence
        | File | Line | What it shows |
        |------|------|---------------|
        | src/services/CTradeServiceFacade.cpp | 427 | context.m_eCurrentState = TradeLifecycleState::Settled — local context only |
        | src/services/CTradeServiceFacade.cpp | 435 | StoreTradeContext(context) — stores facade context, not lifecycle state |
        | src/services/CSettlementService.cpp | 161 | ValidateTradeForSettlement(strTradeId) — called on every ScheduleSettlement |
        | src/services/CSettlementService.cpp | 530-537 | ValidateTradeForSettlement → IsTradeSettleable → GetTradeState |
        | src/services/CSettlementService.cpp | 434 | bSettleable = (stateResult.GetValue() == TradeLifecycleState::Executed) |
        | src/services/CTradeLifecycleService.cpp | 500-509 | GetTradeState returns tradeData.m_eCurrentState from m_mapTradeStore — still Executed |

        ## Chain traced
        SettleAndNotify:427 → context.m_eCurrentState = Settled (local only) →
        2nd SettleAndNotify → ScheduleSettlement → ValidateTradeForSettlement →
        IsTradeSettleable → GetTradeState → returns Executed → bSettleable = true → settles again

        ## Key value tracked
        CTradeLifecycleService::m_mapTradeStore still holds state=Executed after settlement.
        The facade's SFullTradeContext is a separate copy — updating it does not update the lifecycle store.

        ## Suspicious items
        SettleAndNotify never calls m_pLifecycleService after successful settlement. The lifecycle
        state transition to Settled is missing entirely from this code path.

        ## Suggested next lookups
        Check CTradeLifecycleService for a RecordSettlement or SetTradeSettled method
        that SettleAndNotify should be calling.

    # --- Credit bypass: CheckCreditLimit Success(false) not GetValue() checked (eval 10) ---
    - trigger: ".*CheckCreditLimit.*|.*credit.*bypass.*|.*credit.*limit.*bypass.*|.*Success.*false.*credit.*|.*IsFailure.*credit.*"
      response: |
        ## Question answered
        What does CCreditCheckService::CheckCreditLimit return when the credit limit is exceeded,
        and how does ValidateTradeInternal handle that result?

        ## Answer
        CCreditCheckService::CheckCreditLimit returns ServiceResult<bool>::Success(false) when
        the limit is exceeded (line ~138) — NOT Failure. CTradeLifecycleService::ValidateTradeInternal
        only checks creditResult.IsFailure() (line 665). Because Success(false) is not a failure,
        the check passes, bIsValid remains true, and the trade is validated regardless.

        ## Evidence
        | File | Line | What it shows |
        |------|------|---------------|
        | src/services/CCreditCheckService.cpp | ~130-140 | dNewExposure > limits.m_dCreditLimit → return ServiceResult<bool>::Success(false) |
        | src/services/CTradeLifecycleService.cpp | 661-668 | creditResult.IsFailure() check only — GetValue() never read |

        ## Chain traced
        CreateAndValidateTrade → ValidateTrade → ValidateTradeInternal →
        CheckCreditLimit returns Success(false) →
        IsFailure() = false → validation error not set → bIsValid = true → Validated

        ## Key value tracked
        ServiceResult<bool>::Success(false): IsSuccess()=true, IsFailure()=false, GetValue()=false.
        ValidateTradeInternal sees IsFailure()=false and proceeds. The false value is silently discarded.

        ## Suspicious items
        Pattern B analog: Success(false) is the ServiceResult equivalent of a post-increment mismatch —
        the call succeeds at the transport level but carries a false payload that is never inspected.
        ValidateTradeInternal trusts IsFailure() exclusively; it should also check !creditResult.GetValue().

        ## Suggested next lookups
        Confirm that CheckCreditLimit previously returned Failure for over-limit cases
        by checking git history or comparing with the long-overload variant.

    # --- Stale credit: wrong argument to ReleaseCreditReservation (eval 11) ---
    - trigger: ".*ReleaseCreditForTrade.*|.*ReleaseCreditReservation.*|.*stale.*credit.*|.*cancel.*credit.*|.*reservation.*not.*released.*"
      response: |
        ## Question answered
        How does CTradeLifecycleService::ReleaseCreditForTrade release the credit reservation,
        and why does the counterparty reserved total remain after cancellation?

        ## Answer
        ReleaseCreditForTrade calls m_pCreditCheckService->ReleaseCreditReservation(
        refData.m_strCreditReservationId) — passing the reservation ID string (e.g. "RES_..._5")
        instead of refData.m_strTradeId. CCreditCheckService::ReleaseCreditReservation(const string&)
        looks up by trade ID in m_mapCreditReservations. The reservation ID is never a key in that
        map, so the lookup returns NOT_FOUND, the function returns Failure, and
        m_mapCounterpartyReservedTotals is never decremented.

        ## Evidence
        | File | Line | What it shows |
        |------|------|---------------|
        | src/services/CTradeLifecycleService.cpp | ~710 | ReleaseCreditReservation(refData.m_strCreditReservationId) — wrong argument |
        | src/services/CCreditCheckService.cpp | ~295-305 | ReleaseCreditReservation(const string& strTradeId): m_mapCreditReservations.find(strTradeId) |
        | src/services/CCreditCheckService.cpp | ~312-318 | m_mapCounterpartyReservedTotals decrement — only reached if lookup succeeds |

        ## Chain traced
        CancelTrade → ReleaseCreditForTrade →
        ReleaseCreditReservation("RES_..._N") [wrong: should be strTradeId] →
        m_mapCreditReservations.find("RES_..._N") → NOT FOUND →
        returns Failure → m_mapCounterpartyReservedTotals never decremented →
        stale reserved total persists → future CheckCreditLimit counts cancelled trade's amount

        ## Key value tracked
        m_strCreditReservationId = "RES_<timestamp>_N" (format from GenerateReservationId)
        m_mapCreditReservations is keyed by trade ID (e.g. "TRD_<timestamp>_1")
        These are different strings — the lookup always fails.

        ## Suspicious items
        refData.m_strCreditReservationId is populated by ReserveCreditForTrade (correct).
        But ReleaseCreditForTrade should pass refData.m_strTradeId, not the reservation ID.
        The reservation ID is only meaningful for the long-overload: ReleaseCreditReservation(long).

        ## Suggested next lookups
        Confirm refData.m_strTradeId is the correct key by reading the ReserveCredit call in
        CCreditCheckService and noting what key is used in m_mapCreditReservations.

    # --- Generic cross-layer trace (eval 1, 4) ---
    - trigger: ".*adapter.*|.*LoadCounterparty.*|.*hardcoded.*|.*always.*same.*counterparty.*"
      response: |
        ## Question answered
        Why does CCounterpartyService::LoadFromAdapter always return the same counterparty?

        ## Answer
        CCounterpartyService::LoadFromAdapter calls GetCounterpartyById(0) with a hardcoded 0 instead
        of looking up by strCode. Every call returns whatever counterparty has ID 0 in the adapter,
        regardless of the input code.

        ## Evidence
        | File | Line | What it shows |
        |------|------|---------------|
        | src/services/CCounterpartyService.cpp | ~80 | GetCounterpartyById(0) — hardcoded 0, not derived from strCode |

        ## Chain traced
        LoadCounterpartyByCode(strCode) → DB lookup fails → LoadFromAdapter(strCode) →
        m_pAdapter->GetCounterpartyById(0) [hardcoded] → always returns ID-0 counterparty

        ## Key value tracked
        strCode is passed into LoadFromAdapter but never used — the adapter call ignores it entirely.

        ## Suspicious items
        GetCounterpartyById(0) — the 0 should be a translated or looked-up ID derived from strCode.

        ## Suggested next lookups
        CCounterpartyAdapter::GetCounterpartyById to confirm it returns null or ID-0 record.

    # --- Catch-all ---
    - trigger: ".*"
      response: |
        ## Question answered
        Investigating the requested execution thread.

        ## Answer
        Found the relevant function. The implementation contains one suspicious pattern noted below.

        ## Evidence
        | File | Line | What it shows |
        |------|------|---------------|
        | src/core/TradeValidator.cpp | ~85 | validateNotional checks m_product == CashFlow to skip — but default is None, not CashFlow |

        ## Chain traced
        TradeForm constructor → validates with uninitialized product (None) → validateNotional →
        CashFlow guard doesn't match None → zero notional check fires

        ## Key value tracked
        m_product defaults to ProductType::None. The CashFlow guard only skips validation for CashFlow,
        not for None/unset state.

        ## Suspicious items
        No guard for ProductType::None — only CashFlow is protected from the notional check.

        ## Suggested next lookups
        TradeForm::initializeForm to confirm setProduct() is not called before first validation.

  abstractor:
    - trigger: ".*"
      response: |
        SYNTHESIS:
        - Thread connections: CSettlementService::DispatchSettlementEvent sends event type 3 for COMPLETED settlements. CTradeEventDispatcher::DispatchEvent receives this and dispatches via switch(m_nEventType). Case 3 maps to OnTradeSubmitted callback.
        - Root cause: Event type collision — settlement COMPLETED uses type 3 which collides with trade SUBMITTED. Settlement FAILED (type 4) and CANCELLED (type 5) have no cases in the switch and fall to default, silently dropped.
        - Why this explains the symptom: Settlement listeners never receive settlement-specific callbacks because: (1) COMPLETED triggers OnTradeSubmitted instead of OnSettlementCompleted, (2) FAILED/CANCELLED are silently dropped.

        CONFIDENCE: HIGH
        GAPS: None — both send and receive paths confirmed.

        FIX DIRECTION: Use distinct event type ranges for settlement events (e.g. 10, 11, 12) or add settlement-specific cases to DispatchEvent switch.
