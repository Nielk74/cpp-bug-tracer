name: cpp-bug-tracer
description: Investigates bugs in C++ codebases using coordinated specialist agents
version: 1
max_depth: 4

agents:
  - name: thinking-agent
    file: thinking-agent.md
    mode: subagent
    model: qwen/qwen3-next-80b-a3b-instruct:free
    calls: []

  - name: abstraction-agent
    file: abstraction-agent.md
    mode: subagent
    model: qwen/qwen3-next-80b-a3b-instruct:free
    calls: [abstraction-agent, worker-agent]
    max_recursive_depth: 4

  - name: worker-agent
    file: worker-agent.md
    mode: subagent
    model: qwen/qwen3-next-80b-a3b-instruct:free
    calls: []

mock_responses:
  thinking-agent:
    - trigger: ".*"
      response: |
        ## Key Questions
        1. Where is the trade validation logic?
        2. How are product types registered and looked up?
        3. What happens when an unregistered product type is validated?

        ## Proposed Decomposition
        - Thread A: TradeValidator class and validation flow
        - Thread B: Product type registration system
        - Thread C: Error handling in validation

        ## Scope
        - In scope: Validation logic, product type handling
        - Out of scope: UI layer, database layer, logging

  abstraction-agent:
    - trigger: ".*"
      response: |
        ## Thread: TradeValidator investigation
        
        ### Findings
        - TradeValidator.cpp:122 — validate() method entry point
        - TradeValidator.cpp:309 — validateProductSpecific() crashes on unregistered types
        
        ### Connections
        validate() calls validateProductSpecific() which dereferences null for unknown types
        
        ### Gaps
        Need to check ProductFactory/createValidator implementation
        
        ### Suspicious items
        No null check before dereferencing validator pointer

  worker-agent:
    - trigger: ".*"
      response: |
        ## Answer
        The validateProductSpecific method at line 309 calls createValidator() which returns 
        nullptr for unregistered product types, then dereferences it without checking.
        
        ## Key code locations
        | File | Line | What |
        |------|------|------|
        | TradeValidator.cpp | 309 | validateProductSpecific entry |
        | TradeValidator.cpp | 310 | createValidator() call |
        | TradeValidator.cpp | 311 | Null dereference crash |
        
        ## Related symbols
        - createValidator — factory that returns null for unknown types
        
        ## Surprising/suspicious?
        No null check after factory call — assumes all product types are registered.
